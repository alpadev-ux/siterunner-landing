<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background circle -->
  <rect width="500" height="500" fill="#0f172a"/>
  <circle cx="250" cy="250" r="250" fill="#0f172a"/>

  <!-- Scale and center the mark: original viewBox "-2 -6 28 32", so total 30x38 units -->
  <!-- We scale it up to ~260px and center in 500x500 -->
  <g transform="translate(110, 95) scale(10)">
    <defs>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="0.8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g filter="url(#glow)">
      <!-- Cursor arrow pointing NW -->
      <path d="M2,1 L2,21 L6,17 L9,24 L12,23 L9,16 L15,16 Z"
            fill="#5eead4" stroke="rgba(255,255,255,0.45)" stroke-width="1"
            stroke-linejoin="round" stroke-linecap="round"/>
      <!-- Twinkle 1  larger, upper right -->
      <line x1="17" y1="-1.5" x2="17" y2="3.5" stroke="#5eead4" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="14.5" y1="1" x2="19.5" y2="1" stroke="#5eead4" stroke-width="1.3" stroke-linecap="round"/>
      <!-- Twinkle 2  smaller, further right -->
      <line x1="21" y1="5" x2="21" y2="9" stroke="#5eead4" stroke-width="1" stroke-linecap="round"/>
      <line x1="19" y1="7" x2="23" y2="7" stroke="#5eead4" stroke-width="1" stroke-linecap="round"/>
    </g>
  </g>
</svg>
